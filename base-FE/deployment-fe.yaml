apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: campus-navi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 154959837798.dkr.ecr.ap-northeast-2.amazonaws.com/campus-navi-fe:latest
          ports:
            - containerPort: 80